name: Deploy to GitHub Pages

# Deployt den Inhalt von main automatisch auf GitHub Pages.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Nötige Rechte für das Pages-Deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Es läuft immer nur ein Deployment gleichzeitig.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Aktiviert GitHub Pages (Build-Typ "GitHub Actions") automatisch,
          # falls es noch nicht eingerichtet ist – kein manueller Schritt nötig.
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Die statische Seite liegt im Repo-Root.
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
